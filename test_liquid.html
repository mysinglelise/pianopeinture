<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Test Liquid - 2 sources</title>
<style>*{margin:0}body{background:#000;overflow:hidden}</style>
</head><body>
<div style="position:fixed;top:10px;left:10px;color:white;font:13px monospace;z-index:10;background:rgba(0,0,0,0.6);padding:8px;border-radius:6px">
  Maintiens <b>A</b> = source rouge (monte)<br>
  Maintiens <b>S</b> = source bleue (descend)<br>
  Les deux ensemble = interaction des flux<br>
  <b>C</b> = effacer<br>
  <span id="status" style="color:#4dff91">Chargement...</span>
</div>

<canvas id="c"></canvas>

<script>
const status = document.getElementById('status');
const canvas = document.getElementById('c');

// On travaille en résolution réduite pour le fluide
// (le shader est coûteux — 512x512 est un bon compromis)
const SIM_W = 512, SIM_H = 512;
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
canvas.style.width = '100vw';
canvas.style.height = '100vh';

const gl = canvas.getContext('webgl2');
if (!gl) {
  status.textContent = 'WebGL2 indisponible';
  status.style.color = '#ff5555';
  throw new Error('no webgl2');
}
if (!gl.getExtension('EXT_color_buffer_float')) {
  status.textContent = 'EXT_color_buffer_float manquant';
  status.style.color = '#ff5555';
  throw new Error('no float');
}

status.textContent = 'WebGL2 OK — appuie sur A et S';

/* ══ Quad plein écran ══════════════════════════════════ */
const VS = `#version 300 es
in vec2 a_pos;
out vec2 v_uv;
void main(){
  v_uv = (a_pos + 1.0) * 0.5;
  gl_Position = vec4(a_pos, 0, 1);
}`;

/* ══ Shader de simulation (Buffer A) ══════════════════
   Adapté du Liquid toy de Leon Denise.
   Stocke dans RGBA :
     R = hauteur (densité de peinture)
     GBA = couleur RGB de la peinture
   Sources = notes injectées via uniforms.
══════════════════════════════════════════════════════ */
const FS_SIM = `#version 300 es
precision highp float;
in vec2 v_uv;
out vec4 o;

uniform sampler2D u_prev;
uniform float u_time;
uniform float u_dt;
uniform float u_fade;
uniform float u_turb;
uniform float u_expan;

// Sources (max 8)
uniform int   u_n;
uniform vec2  u_pos[8];    // position [0..1]
uniform vec2  u_dir[8];    // direction normalisée
uniform float u_str[8];    // force [0..1]
uniform vec3  u_col[8];    // couleur RGB
uniform float u_rad[8];    // rayon du blob

float hash(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453); }
float noise(vec2 p){
  vec2 i=floor(p),f=fract(p),u=f*f*(3.-2.*f);
  return mix(mix(hash(i),hash(i+vec2(1,0)),u.x),
             mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),u.x),u.y);
}
float fbm(vec2 p){
  float v=0.,a=.5;
  for(int i=0;i<4;i++){v+=a*noise(p);p=p*2.1+vec2(1.7,9.2);a*=.5;}
  return v;
}

void main(){
  vec2 uv = v_uv;
  ivec2 sz = textureSize(u_prev, 0);
  vec2 px = 1.0 / vec2(sz);
  vec2 asp = vec2(float(sz.x)/float(sz.y), 1.0);

  // Lire frame précédente
  vec4 prev = texture(u_prev, uv);
  float h = prev.r;
  vec3 col = prev.gba;

  // Gradient → expansion (pousse la peinture vers l'extérieur)
  float dx = texture(u_prev, uv+vec2(px.x,0)).r
           - texture(u_prev, uv-vec2(px.x,0)).r;
  float dy = texture(u_prev, uv+vec2(0,px.y)).r
           - texture(u_prev, uv-vec2(0,px.y)).r;
  vec2 grad = vec2(dx, dy);
  vec2 off = -grad * u_expan * 1.2 / asp;

  // Turbulence (donne le mouvement organique)
  float ang = fbm(uv*5.0 + u_time*0.3) * 6.28318 + u_time*0.2;
  off += vec2(cos(ang), sin(ang)) * u_turb * 0.004 / asp;

  // Advection : lire la position déformée
  vec4 adv = texture(u_prev, clamp(uv + off, vec2(0), vec2(1)));

  // Fade temporel (Liquid toy)
  float nh = max(adv.r - u_dt * u_fade * 0.4, 0.0);
  vec3 nc = adv.gba;

  // Injecter les sources (notes)
  for(int i = 0; i < 8; i++){
    if(i >= u_n) break;

    vec2 d = (uv - u_pos[i]) * asp;
    float dist = length(d);
    float r = u_rad[i];

    // Blob irrégulier avec bruit
    float irr = fbm(uv * 16.0 + vec2(float(i)*4.1, u_time*0.15)) * 0.25;
    float blob = smoothstep(r*(1.0+irr), r*0.2, dist);

    if(blob > 0.001){
      // Injection de hauteur
      float str = blob * (0.3 + u_str[i] * 0.6);
      nh = max(nh, str);
      // Injection de couleur
      nc = mix(nc, u_col[i], blob * 0.85);

      // Injection de vélocité dans la direction de la note
      // → distord l'offset pour orienter le flux
      off += u_dir[i] * blob * u_str[i] * 0.008 / asp;
    }
  }

  o = vec4(clamp(nh, 0.0, 1.0), clamp(nc, 0.0, 1.0));
}`;

/* ══ Shader de rendu final (éclairage Liquid toy) ═════ */
const FS_RENDER = `#version 300 es
precision highp float;
in vec2 v_uv;
out vec4 o;

uniform sampler2D u_buf;
uniform float u_lpow;
uniform float u_rainbow;
uniform vec3 u_bg;

void main(){
  vec2 uv = v_uv;
  ivec2 sz = textureSize(u_buf, 0);
  vec2 px = 3.0 / vec2(sz);

  vec4 data = texture(u_buf, uv);
  float gray = data.r;
  vec3 pc = data.gba;

  // Normale de surface depuis gradient de hauteur
  float hL = texture(u_buf, uv-vec2(px.x,0)).r;
  float hR = texture(u_buf, uv+vec2(px.x,0)).r;
  float hD = texture(u_buf, uv-vec2(0,px.y)).r;
  float hU = texture(u_buf, uv+vec2(0,px.y)).r;
  vec3 nrm = normalize(vec3(hR-hL, hU-hD, gray*gray*2.0+0.08));

  // Éclairage
  vec3 ld = normalize(vec3(0.5, 0.8, 1.6));
  float diff = dot(nrm, ld)*0.5+0.5;
  vec3 col = vec3(0.18)*(1.0-abs(dot(nrm,vec3(0,0,1))));
  col += vec3(0.6)*pow(max(0.0,dot(nrm,ld)), u_lpow);
  col += pc * smoothstep(0.01, 0.10, gray) * diff;

  // Arc-en-ciel irisé (signature Liquid toy)
  vec3 rb = 0.5+0.5*cos(vec3(1,2,3)+dot(nrm,ld)*4.0-uv.y*3.0-3.0);
  col += rb * u_rainbow * smoothstep(0.04, 0.0, gray) * 0.7;
  col += rb * u_rainbow * pow(max(0.0,dot(nrm,ld)), u_lpow) * 0.4;

  col = mix(u_bg, clamp(col,0.0,1.0), smoothstep(0.004, 0.045, gray));
  o = vec4(col, 1.0);
}`;

/* ══ Compilation ═══════════════════════════════════════ */
function mkShader(src, type){
  const s = gl.createShader(type);
  gl.shaderSource(s, src); gl.compileShader(s);
  if(!gl.getShaderParameter(s, gl.COMPILE_STATUS)){
    console.error(gl.getShaderInfoLog(s)); return null;
  }
  return s;
}
function mkProg(vs, fs){
  const p = gl.createProgram();
  gl.attachShader(p, mkShader(vs, gl.VERTEX_SHADER));
  gl.attachShader(p, mkShader(fs, gl.FRAGMENT_SHADER));
  gl.linkProgram(p);
  if(!gl.getProgramParameter(p, gl.LINK_STATUS)){
    console.error(gl.getProgramInfoLog(p)); return null;
  }
  return p;
}

const progSim = mkProg(VS, FS_SIM);
const progRender = mkProg(VS, FS_RENDER);

if(!progSim || !progRender){
  status.textContent = 'Erreur compilation shader';
  status.style.color = '#ff5555';
  throw new Error('shader fail');
}

/* ══ Quad ══════════════════════════════════════════════ */
const qb = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, qb);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);

function bindQuad(p){
  const l = gl.getAttribLocation(p, 'a_pos');
  gl.enableVertexAttribArray(l);
  gl.bindBuffer(gl.ARRAY_BUFFER, qb);
  gl.vertexAttribPointer(l, 2, gl.FLOAT, false, 0, 0);
}

/* ══ Framebuffers ping-pong ════════════════════════════ */
function mkFB(){
  const t = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, t);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA32F, SIM_W, SIM_H, 0, gl.RGBA, gl.FLOAT, null);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  const f = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, f);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, t, 0);
  gl.clearColor(0,0,0,0); gl.clear(gl.COLOR_BUFFER_BIT);
  return {tex:t, fb:f};
}
let fbA = mkFB(), fbB = mkFB();
gl.bindFramebuffer(gl.FRAMEBUFFER, null);

/* ══ Uniforms helpers ══════════════════════════════════ */
const u1f=(p,n,v)=>gl.uniform1f(gl.getUniformLocation(p,n),v);
const u1i=(p,n,v)=>gl.uniform1i(gl.getUniformLocation(p,n),v);
const u3f=(p,n,a)=>gl.uniform3f(gl.getUniformLocation(p,n),a[0],a[1],a[2]);

/* ══ Sources actives ═══════════════════════════════════
   Chaque source = {pos:[x,y], dir:[dx,dy], str, col:[r,g,b], rad}
══════════════════════════════════════════════════════ */
const sources = new Map();

function addSource(key, pos, dir, str, col, rad){
  sources.set(key, {pos, dir, str, col, rad});
}
function removeSource(key){ sources.delete(key); }

function clearAll(){
  fbA = mkFB(); fbB = mkFB();
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
}

/* ══ Clavier ═══════════════════════════════════════════ */
window.addEventListener('keydown', e => {
  if(e.repeat) return;
  if(e.key==='a'||e.key==='A'){
    // Source rouge : position gauche-centre, direction vers le haut
    addSource('a', [0.25, 0.5], [0.1, 0.9], 0.85, [1.0,0.2,0.15], 0.08);
  }
  if(e.key==='s'||e.key==='S'){
    // Source bleue : position droite-centre, direction vers le bas-gauche
    addSource('s', [0.75, 0.5], [-0.3, -0.8], 0.85, [0.2,0.4,1.0], 0.08);
  }
  if(e.key==='c'||e.key==='C') clearAll();
});
window.addEventListener('keyup', e => {
  if(e.key==='a'||e.key==='A') removeSource('a');
  if(e.key==='s'||e.key==='S') removeSource('s');
});

/* ══ Boucle ════════════════════════════════════════════ */
let lastT = 0;
function loop(t){
  requestAnimationFrame(loop);
  const dt = Math.min(0.05, (t-lastT)/1000); lastT=t;
  const time = t/1000;

  const srcList = [...sources.values()];
  const N = Math.min(srcList.length, 8);

  // Préparer les arrays
  const pos   = new Float32Array(8*2);
  const dir   = new Float32Array(8*2);
  const str   = new Float32Array(8);
  const col   = new Float32Array(8*3);
  const rad   = new Float32Array(8);

  srcList.forEach((s,i)=>{
    if(i>=8) return;
    pos[i*2]=s.pos[0]; pos[i*2+1]=s.pos[1];
    dir[i*2]=s.dir[0]; dir[i*2+1]=s.dir[1];
    str[i]=s.str;
    col[i*3]=s.col[0]; col[i*3+1]=s.col[1]; col[i*3+2]=s.col[2];
    rad[i]=s.rad;
  });

  /* Passe 1 : simulation → fbB */
  gl.bindFramebuffer(gl.FRAMEBUFFER, fbB.fb);
  gl.viewport(0, 0, SIM_W, SIM_H);
  gl.useProgram(progSim); bindQuad(progSim);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, fbA.tex);
  u1i(progSim,'u_prev',0);
  u1f(progSim,'u_time',time);
  u1f(progSim,'u_dt',dt);
  u1f(progSim,'u_fade',0.18);
  u1f(progSim,'u_turb',0.50);
  u1f(progSim,'u_expan',0.60);
  u1i(progSim,'u_n',N);
  if(N>0){
    gl.uniform2fv(gl.getUniformLocation(progSim,'u_pos'),pos);
    gl.uniform2fv(gl.getUniformLocation(progSim,'u_dir'),dir);
    gl.uniform1fv(gl.getUniformLocation(progSim,'u_str'),str);
    gl.uniform3fv(gl.getUniformLocation(progSim,'u_col'),col);
    gl.uniform1fv(gl.getUniformLocation(progSim,'u_rad'),rad);
  }
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

  // Swap
  const tmp=fbA; fbA=fbB; fbB=tmp;

  /* Passe 2 : rendu final → écran */
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  gl.viewport(0, 0, canvas.width, canvas.height);
  gl.useProgram(progRender); bindQuad(progRender);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, fbA.tex);
  u1i(progRender,'u_buf',0);
  u1f(progRender,'u_lpow',18.0);
  u1f(progRender,'u_rainbow',0.55);
  u3f(progRender,'u_bg',[0.04,0.04,0.10]);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

requestAnimationFrame(loop);
</script>
</body></html>
