<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Test Three.js</title>
<style>*{margin:0}body{background:#000;overflow:hidden}</style>
</head><body>
<div style="position:fixed;top:10px;left:10px;color:white;font:12px monospace;z-index:10" id="log">
  Appuie sur A, S, D pour tester<br>
  Les boules doivent monter ou descendre selon la touche<br>
  Chaque boule laisse une traînée blanche
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0.05, 0.05, 0.1);

const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 100);
camera.position.set(0, 0, 10);

scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const dL = new THREE.DirectionalLight(0xffffff, 1);
dL.position.set(5, 8, 10);
scene.add(dL);

// Chaque blob a : mesh + traînée dynamique
const blobs = [];

function spawnBlob(color, posY, velY) {
  // Sphère simple
  const geo = new THREE.SphereGeometry(0.3, 16, 12);
  const mat = new THREE.MeshPhongMaterial({color, shininess: 80});
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(-3, posY, 0);
  scene.add(mesh);

  // Traînée : buffer pré-alloué de 500 points
  const MAX = 500;
  const positions = new Float32Array(MAX * 3);
  // Remplir le premier point
  positions[0] = -3; positions[1] = posY; positions[2] = 0;

  const trailGeo = new THREE.BufferGeometry();
  const attr = new THREE.BufferAttribute(positions, 3);
  trailGeo.setAttribute('position', attr);
  trailGeo.setDrawRange(0, 1);

  const trailMat = new THREE.LineBasicMaterial({color, transparent:true, opacity:0.8});
  const trail = new THREE.Line(trailGeo, trailMat);
  trail.frustumCulled = false;
  scene.add(trail);

  blobs.push({mesh, trail, trailGeo, attr, positions, count:1, vy: velY, alive:true});
}

// A = monte vite, S = horizontal, D = descend
window.addEventListener('keydown', e => {
  if(e.key === 'a') spawnBlob(0xff4444, 0,  0.08);  // monte
  if(e.key === 's') spawnBlob(0x44ff44, 0,  0);     // fixe
  if(e.key === 'd') spawnBlob(0x4444ff, 0, -0.08);  // descend
  if(e.key === 'c') {
    blobs.forEach(b => { scene.remove(b.mesh); scene.remove(b.trail); });
    blobs.length = 0;
  }
});

const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(0.05, clock.getDelta());

  for(const b of blobs) {
    if(!b.alive) continue;

    // Déplacer le blob
    b.mesh.position.x += 0.04;
    b.mesh.position.y += b.vy;

    // Ajouter un point à la traînée si on a de la place
    if(b.count < 499) {
      const i = b.count * 3;
      b.positions[i]   = b.mesh.position.x;
      b.positions[i+1] = b.mesh.position.y;
      b.positions[i+2] = b.mesh.position.z;
      b.count++;
      b.trailGeo.setDrawRange(0, b.count);
      b.attr.needsUpdate = true;  // ← clé !
    }

    // Arrêter si hors écran
    if(Math.abs(b.mesh.position.x) > 8 || Math.abs(b.mesh.position.y) > 6) {
      b.alive = false;
    }
  }

  renderer.render(scene, camera);
}
animate();
</script>
</body></html>
