<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Test Liquid</title>
<style>*{margin:0}body{background:#000;overflow:hidden}</style>
</head><body>
<div style="position:fixed;top:10px;left:10px;color:white;font:13px monospace;z-index:10;background:rgba(0,0,0,0.6);padding:8px;border-radius:6px">
  Cliquer sur le canvas d'abord, puis :<br>
  Maintiens <b>A</b> = rouge &nbsp; <b>S</b> = bleu &nbsp; <b>C</b> = effacer<br>
  <span id="status" style="color:#4dff91">Chargement...</span><br>
  <span id="log" style="color:#ffaa00;font-size:11px"></span>
</div>
<canvas id="c"></canvas>
<script>
const status = document.getElementById('status');
const logEl  = document.getElementById('log');
function log(msg){ logEl.textContent = msg; console.log(msg); }

const canvas = document.getElementById('c');
canvas.width  = window.innerWidth;
canvas.height = window.innerHeight;
canvas.style.cssText = 'position:fixed;top:0;left:0;width:100vw;height:100vh';

const gl = canvas.getContext('webgl2');
if(!gl){ status.textContent='WebGL2 indisponible'; throw 0; }
if(!gl.getExtension('EXT_color_buffer_float')){ status.textContent='Float manquant'; throw 0; }

const SIM = 512;

const VS = `#version 300 es
in vec2 p; out vec2 uv;
void main(){ uv=(p+1.)*.5; gl_Position=vec4(p,0,1); }`;

const FS_SIM = `#version 300 es
precision highp float;
in vec2 uv; out vec4 o;
uniform sampler2D prev;
uniform float time,dt,fade,turb,expan;
uniform int n;
uniform vec2 pos[8],dir[8];
uniform float str[8],rad[8];
uniform vec3 col[8];

float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
float noise(vec2 p){
  vec2 i=floor(p),f=fract(p),u=f*f*(3.-2.*f);
  return mix(mix(hash(i),hash(i+vec2(1,0)),u.x),
             mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),u.x),u.y);
}
float fbm(vec2 p){float v=0.,a=.5;for(int i=0;i<4;i++){v+=a*noise(p);p=p*2.1+vec2(1.7,9.2);a*=.5;}return v;}

void main(){
  vec2 px=1./vec2(textureSize(prev,0));
  vec4 pv=texture(prev,uv);
  float h=pv.r; vec3 c=pv.gba;

  float dx=texture(prev,uv+vec2(px.x,0)).r-texture(prev,uv-vec2(px.x,0)).r;
  float dy=texture(prev,uv+vec2(0,px.y)).r-texture(prev,uv-vec2(0,px.y)).r;
  float ang=fbm(uv*5.+time*.3)*6.283+time*.2;
  vec2 off=vec2(-dx,-dy)*expan+vec2(cos(ang),sin(ang))*turb*.004;

  vec4 adv=texture(prev,clamp(uv+off,vec2(0),vec2(1)));
  float nh=max(adv.r-dt*fade*.4,0.);
  vec3 nc=adv.gba;

  for(int i=0;i<8;i++){
    if(i>=n)break;
    float d=length((uv-pos[i])*vec2(1.78,1.));
    float irr=fbm(uv*16.+vec2(float(i)*4.1))*.22;
    float blob=smoothstep(rad[i]*(1.+irr),rad[i]*.2,d);
    if(blob>.001){
      nh=max(nh,blob*(.3+str[i]*.6));
      nc=mix(nc,col[i],blob*.85);
      off+=dir[i]*blob*str[i]*.008;
    }
  }
  o=vec4(clamp(nh,0.,1.),clamp(nc,0.,1.));
}`;

const FS_OUT = `#version 300 es
precision highp float;
in vec2 uv; out vec4 o;
uniform sampler2D buf;

void main(){
  vec2 px=3./vec2(textureSize(buf,0));
  vec4 d=texture(buf,uv);
  float g=d.r; vec3 pc=d.gba;
  float hL=texture(buf,uv-vec2(px.x,0)).r, hR=texture(buf,uv+vec2(px.x,0)).r;
  float hD=texture(buf,uv-vec2(0,px.y)).r, hU=texture(buf,uv+vec2(0,px.y)).r;
  vec3 nm=normalize(vec3(hR-hL,hU-hD,g*g*2.+.08));
  vec3 ld=normalize(vec3(.5,.8,1.6));
  float diff=dot(nm,ld)*.5+.5;
  vec3 rb=.5+.5*cos(vec3(1,2,3)+dot(nm,ld)*4.-uv.y*3.-3.);
  vec3 col=vec3(.18)*(1.-abs(dot(nm,vec3(0,0,1))));
  col+=vec3(.6)*pow(max(0.,dot(nm,ld)),18.);
  col+=pc*smoothstep(.01,.10,g)*diff;
  col+=rb*.55*smoothstep(.04,0.,g)*.7;
  col=mix(vec3(.04,.04,.10),clamp(col,0.,1.),smoothstep(.004,.045,g));
  o=vec4(col,1);
}`;

function mkS(src,type){
  const s=gl.createShader(type);
  gl.shaderSource(s,src);gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)){
    log('Shader err: '+gl.getShaderInfoLog(s));return null;
  }
  return s;
}
function mkP(vs,fs){
  const p=gl.createProgram();
  gl.attachShader(p,mkS(vs,gl.VERTEX_SHADER));
  gl.attachShader(p,mkS(fs,gl.FRAGMENT_SHADER));
  gl.linkProgram(p);
  if(!gl.getProgramParameter(p,gl.LINK_STATUS)){
    log('Prog err: '+gl.getProgramInfoLog(p));return null;
  }
  return p;
}

const pSim=mkP(VS,FS_SIM);
const pOut=mkP(VS,FS_OUT);
if(!pSim||!pOut){ status.textContent='Erreur shader'; throw 0; }

status.textContent='Shaders OK — cliquer canvas puis A ou S';

const qb=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,qb);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);

function bq(p){
  const l=gl.getAttribLocation(p,'p');
  gl.enableVertexAttribArray(l);
  gl.bindBuffer(gl.ARRAY_BUFFER,qb);
  gl.vertexAttribPointer(l,2,gl.FLOAT,false,0,0);
}

function mkFB(){
  const t=gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D,t);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA32F,SIM,SIM,0,gl.RGBA,gl.FLOAT,null);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
  const f=gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER,f);
  gl.framebufferTexture2D(gl.FRAMEBUFFER,gl.COLOR_ATTACHMENT0,gl.TEXTURE_2D,t,0);
  gl.clearColor(0,0,0,0);gl.clear(gl.COLOR_BUFFER_BIT);
  return{tex:t,fb:f};
}
let fbA=mkFB(),fbB=mkFB();
gl.bindFramebuffer(gl.FRAMEBUFFER,null);

const u1f=(p,n,v)=>gl.uniform1f(gl.getUniformLocation(p,n),v);
const u1i=(p,n,v)=>gl.uniform1i(gl.getUniformLocation(p,n),v);

const srcs=new Map();

function addSrc(key,px,py,dx,dy,s,r,g,b,rad){
  srcs.set(key,{pos:[px,py],dir:[dx,dy],str:s,col:[r,g,b],rad});
  log('Source ajoutée: '+key+' n='+srcs.size);
}
function rmSrc(key){ srcs.delete(key); log('Source retirée: '+key); }

// Clavier — on écoute sur window ET sur canvas
function onKey(e){
  if(e.repeat)return;
  log('Touche: '+e.key);
  if(e.key==='a'||e.key==='A') addSrc('a',0.25,0.5, 0.1,0.9, 0.9,1.0,0.2,0.15, 0.08);
  if(e.key==='s'||e.key==='S') addSrc('s',0.75,0.5,-0.3,-0.8,0.9,0.2,0.4,1.0,  0.08);
  if(e.key==='c'||e.key==='C'){ fbA=mkFB();fbB=mkFB();gl.bindFramebuffer(gl.FRAMEBUFFER,null);srcs.clear(); }
}
function offKey(e){
  if(e.key==='a'||e.key==='A') rmSrc('a');
  if(e.key==='s'||e.key==='S') rmSrc('s');
}
window.addEventListener('keydown', onKey);
window.addEventListener('keyup',   offKey);
canvas.addEventListener('keydown', onKey);
canvas.setAttribute('tabindex','0');

let lastT=0;
function loop(t){
  requestAnimationFrame(loop);
  const dt=Math.min(.05,(t-lastT)/1000);lastT=t;
  const time=t/1000;
  const sl=[...srcs.values()];
  const N=Math.min(sl.length,8);

  const posA=new Float32Array(16),dirA=new Float32Array(16);
  const strA=new Float32Array(8),radA=new Float32Array(8);
  const colA=new Float32Array(24);
  sl.forEach((s,i)=>{
    if(i>=8)return;
    posA[i*2]=s.pos[0];posA[i*2+1]=s.pos[1];
    dirA[i*2]=s.dir[0];dirA[i*2+1]=s.dir[1];
    strA[i]=s.str;radA[i]=s.rad;
    colA[i*3]=s.col[0];colA[i*3+1]=s.col[1];colA[i*3+2]=s.col[2];
  });

  // Sim
  gl.bindFramebuffer(gl.FRAMEBUFFER,fbB.fb);
  gl.viewport(0,0,SIM,SIM);
  gl.useProgram(pSim);bq(pSim);
  gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,fbA.tex);
  u1i(pSim,'prev',0);
  u1f(pSim,'time',time);u1f(pSim,'dt',dt);
  u1f(pSim,'fade',.18);u1f(pSim,'turb',.5);u1f(pSim,'expan',.6);
  u1i(pSim,'n',N);
  if(N>0){
    gl.uniform2fv(gl.getUniformLocation(pSim,'pos'),posA);
    gl.uniform2fv(gl.getUniformLocation(pSim,'dir'),dirA);
    gl.uniform1fv(gl.getUniformLocation(pSim,'str'),strA);
    gl.uniform1fv(gl.getUniformLocation(pSim,'rad'),radA);
    gl.uniform3fv(gl.getUniformLocation(pSim,'col'),colA);
  }
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
  const tmp=fbA;fbA=fbB;fbB=tmp;

  // Rendu
  gl.bindFramebuffer(gl.FRAMEBUFFER,null);
  gl.viewport(0,0,canvas.width,canvas.height);
  gl.useProgram(pOut);bq(pOut);
  gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,fbA.tex);
  u1i(pOut,'buf',0);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
}
requestAnimationFrame(loop);
</script>
</body></html>
