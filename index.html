<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Piano Peinture V5.2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Courier New',monospace}
canvas{position:fixed;top:0;left:0;width:100vw;height:100vh}
#ui{position:fixed;top:14px;left:14px;z-index:20;display:flex;flex-direction:column;gap:7px;pointer-events:none;transition:opacity .4s}
#ui.hidden{opacity:0;pointer-events:none}
.panel{background:rgba(0,0,0,0.68);border:0.5px solid rgba(255,255,255,0.13);border-radius:8px;padding:9px 13px;pointer-events:all}
.ptitle{font-size:9px;letter-spacing:.14em;color:rgba(255,255,255,.28);text-transform:uppercase;margin-bottom:7px}
.row{display:flex;align-items:center;gap:9px;margin:4px 0}
label{font-size:11px;color:rgba(255,255,255,.38);min-width:82px}
select{background:rgba(255,255,255,.06);border:0.5px solid rgba(255,255,255,.16);border-radius:4px;color:rgba(255,255,255,.82);padding:3px 6px;font-size:11px;font-family:inherit;cursor:pointer;outline:none}
input[type=range]{-webkit-appearance:none;width:88px;height:3px;border-radius:2px;background:rgba(255,255,255,.14);outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;border-radius:50%;background:#9b96d4;cursor:pointer}
.val{font-size:11px;color:rgba(255,255,255,.38);min-width:36px}
#midi-dot{width:8px;height:8px;border-radius:50%;background:#333;flex-shrink:0;transition:background .4s}
#midi-dot.on{background:#4dff91;box-shadow:0 0 5px #4dff91}
#midi-dot.err{background:#ff5555}
#note-log{display:flex;flex-direction:column;gap:3px;max-height:80px;overflow:hidden}
.nrow{display:flex;align-items:center;gap:7px;font-size:10px}
.nbadge{width:6px;height:6px;border-radius:50%;flex-shrink:0}
#hint{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:rgba(255,255,255,.2);font-size:13px;line-height:2.2;pointer-events:none;transition:opacity 1.5s;z-index:5}
#hint.gone{opacity:0}
#kbhint{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);font-size:10px;color:rgba(255,255,255,.13);pointer-events:none;z-index:5}
#ped-ind{position:fixed;bottom:10px;right:14px;font-size:10px;letter-spacing:.1em;pointer-events:none;color:rgba(255,255,255,.15);z-index:5}
#ped-ind.on{color:#9b96d4}
#hide-hint{position:fixed;top:14px;right:14px;font-size:10px;color:rgba(255,255,255,.2);pointer-events:none;z-index:5}
</style>
</head>
<body>
<canvas id="c" tabindex="0"></canvas>

<div id="ui">
  <div class="panel">
    <div class="row" style="gap:8px">
      <div id="midi-dot"></div>
      <span id="midi-label" style="font-size:11px;color:rgba(255,255,255,.55)">Connexion MIDI…</span>
    </div>
  </div>
  <div class="panel">
    <div class="ptitle">Fluide</div>
    <div class="row"><label>Palette</label>
      <select id="pal-sel">
        <option value="0">0 – Saturée</option><option value="1">1 – Pastel</option>
        <option value="2">2 – Chaude</option><option value="3">3 – Vive</option>
        <option value="4">4 – Bleu-violet</option>
      </select>
    </div>
    <div class="row"><label>Fond</label>
      <select id="bg-sel">
        <option value="0.04,0.04,0.10">Bleu nuit</option>
        <option value="0,0,0">Noir</option>
        <option value="0.07,0.02,0.11">Violet sombre</option>
        <option value="0.96,0.94,0.91">Blanc chaud</option>
      </select>
    </div>
    <div class="row"><label>Vitesse</label>
      <input type="range" id="spd" min="1" max="100" value="25" step="1">
      <span class="val" id="spd-v">25%</span>
    </div>
    <div class="row"><label>Expansion</label>
      <input type="range" id="expan" min="1" max="100" value="22" step="1">
      <span class="val" id="expan-v">0.022</span>
    </div>
    <div class="row"><label>Turbulence</label>
      <input type="range" id="turb" min="0" max="100" value="22" step="1">
      <span class="val" id="turb-v">0.22</span>
    </div>
    <div class="row"><label>Fade</label>
      <input type="range" id="fade" min="0" max="100" value="15" step="1">
      <span class="val" id="fade-v">0.15</span>
    </div>
    <div class="row"><label>Taille blob</label>
      <input type="range" id="brad" min="1" max="30" value="8" step="1">
      <span class="val" id="brad-v">0.08</span>
    </div>
    <div class="row"><label>Arc-en-ciel</label>
      <input type="range" id="rainbow" min="0" max="100" value="55" step="5">
      <span class="val" id="rainbow-v">0.55</span>
    </div>
    <div class="row"><label>Lumière</label>
      <input type="range" id="lpow" min="2" max="40" value="18" step="1">
      <span class="val" id="lpow-v">18</span>
    </div>
  </div>
  <div class="panel">
    <div class="ptitle">Notes jouées</div>
    <div id="note-log"></div>
  </div>
</div>

<div id="hide-hint">H = cacher/montrer</div>
<div id="hint">Jouez sur votre clavier MIDI<br>
  <span style="font-size:11px">A S D F G H J K &nbsp;|&nbsp; W E T Y U</span><br>
  <span style="font-size:10px;opacity:.6">Espace=pédale &nbsp; C=effacer &nbsp; H=UI</span>
</div>
<div id="kbhint">A S D F G H J K &nbsp;|&nbsp; W E T Y U &nbsp;|&nbsp; Espace=pédale &nbsp; C=effacer &nbsp; H=UI</div>
<div id="ped-ind">PÉDALE</div>

<script>
const PALETTES=[
  {C:[0,55,95],Cs:[285,85,45],D:[55,90,60],Ds:[25,70,65],E:[200,80,70],F:[350,90,35],Fs:[220,75,75],G:[30,85,65],Gs:[275,70,50],A:[120,85,55],As:[320,85,40],B:[210,85,80]},
  {C:[5,35,80],Cs:[290,30,85],D:[60,40,85],Ds:[35,35,80],E:[205,35,85],F:[355,40,75],Fs:[225,35,85],G:[35,40,85],Gs:[280,35,80],A:[125,40,80],As:[325,35,75],B:[215,40,88]},
  {C:[15,75,65],Cs:[300,70,60],D:[70,75,70],Ds:[45,65,70],E:[215,70,75],F:[10,75,50],Fs:[235,70,80],G:[45,75,70],Gs:[290,65,65],A:[135,75,65],As:[340,70,55],B:[225,75,85]},
  {C:[0,100,60],Cs:[285,100,55],D:[55,100,70],Ds:[25,100,75],E:[200,100,80],F:[350,100,45],Fs:[220,100,85],G:[30,100,75],Gs:[275,100,60],A:[120,100,65],As:[320,100,50],B:[210,100,90]},
  {C:[260,70,50],Cs:[275,75,45],D:[285,65,55],Ds:[295,70,60],E:[305,65,65],F:[315,75,40],Fs:[325,70,70],G:[270,75,60],Gs:[280,65,50],A:[290,70,55],As:[300,75,45],B:[250,80,80]}
];
const NOTE_NAMES=['C','Cs','D','Ds','E','F','Fs','G','Gs','A','As','B'];
const NOTE_MIN=37,NOTE_MAX=97;
function hsl2rgb(h,s,l){s/=100;l/=100;const a=s*Math.min(l,1-l);const f=n=>{const k=(n+h/30)%12;return l-a*Math.max(-1,Math.min(k-3,9-k,1))};return[f(0),f(8),f(4)];}

const canvas=document.getElementById('c');
canvas.width=window.innerWidth;canvas.height=window.innerHeight;
const gl=canvas.getContext('webgl2');
if(!gl){document.getElementById('midi-label').textContent='WebGL2 indisponible';throw 0;}
gl.getExtension('EXT_color_buffer_float');
gl.getExtension('EXT_color_buffer_half_float');
function testFB(fmt,type){
  const t=gl.createTexture();gl.bindTexture(gl.TEXTURE_2D,t);
  gl.texImage2D(gl.TEXTURE_2D,0,fmt,4,4,0,gl.RGBA,type,null);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.NEAREST);
  const f=gl.createFramebuffer();gl.bindFramebuffer(gl.FRAMEBUFFER,f);
  gl.framebufferTexture2D(gl.FRAMEBUFFER,gl.COLOR_ATTACHMENT0,gl.TEXTURE_2D,t,0);
  const ok=gl.checkFramebufferStatus(gl.FRAMEBUFFER)===gl.FRAMEBUFFER_COMPLETE;
  gl.bindFramebuffer(gl.FRAMEBUFFER,null);gl.deleteTexture(t);gl.deleteFramebuffer(f);return ok;
}
let FMT,TYPE;
if(testFB(gl.RGBA16F,gl.HALF_FLOAT)){FMT=gl.RGBA16F;TYPE=gl.HALF_FLOAT;}
else if(testFB(gl.RGBA32F,gl.FLOAT)){FMT=gl.RGBA32F;TYPE=gl.FLOAT;}
else{FMT=gl.RGBA8;TYPE=gl.UNSIGNED_BYTE;}

const SIM=512;
const VS=`#version 300 es
in vec2 p;out vec2 uv;
void main(){uv=(p+1.)*.5;gl_Position=vec4(p,0,1);}`;

const FS_SIM=`#version 300 es
precision mediump float;
in vec2 uv;out vec4 o;
uniform sampler2D prev;
uniform float time,fade,turb,expan;
uniform int n;
uniform vec2 pos[16];
uniform float str[16],rad[16];
uniform vec3 col[16];

float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
float noise(vec2 p){
  vec2 i=floor(p),f=fract(p),u=f*f*(3.-2.*f);
  return mix(mix(hash(i),hash(i+vec2(1,0)),u.x),
             mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),u.x),u.y);
}
float fbm(vec2 p){float v=0.,a=.5;for(int i=0;i<3;i++){v+=a*noise(p);p=p*2.+vec2(1.7,9.2);a*=.5;}return v;}

void main(){
  vec2 px=1./vec2(textureSize(prev,0));
  float hL=texture(prev,uv-vec2(px.x,0)).r;
  float hR=texture(prev,uv+vec2(px.x,0)).r;
  float hD=texture(prev,uv-vec2(0,px.y)).r;
  float hU=texture(prev,uv+vec2(0,px.y)).r;
  vec2 grad=vec2(hR-hL,hU-hD);
  // Turbulence centrée sur zéro → toutes directions
  float n1=fbm(uv*4.+time*.2)*2.-1.;
  float n2=fbm(uv*4.+vec2(5.2,1.3)+time*.2)*2.-1.;
  vec2 off=-grad*expan+vec2(n1,n2)*turb;
  vec2 srcUV=clamp(uv+off*px*8.,vec2(0.001),vec2(0.999));
  vec4 adv=texture(prev,srcUV);
  float nh=max(adv.r-fade*0.003,0.);
  vec3 nc=adv.gba;
  for(int i=0;i<16;i++){
    if(i>=n)break;
    float d=length(uv-pos[i]);
    float blob=smoothstep(rad[i],rad[i]*.1,d);
    if(blob>.001){
      nh=max(nh,blob*(.3+str[i]*.6));
      nc=mix(nc,col[i],blob*.88);
    }
  }
  o=vec4(clamp(nh,0.,1.),clamp(nc,0.,1.));
}`;

// Shader de rendu adapté fond clair/sombre
const FS_OUT=`#version 300 es
precision mediump float;
in vec2 uv;out vec4 o;
uniform sampler2D buf;
uniform float rainbow,lpow,bgLum;
uniform vec3 bg;

void main(){
  vec2 px=3./vec2(textureSize(buf,0));
  vec4 d=texture(buf,uv);
  float g=d.r;vec3 pc=d.gba;
  float hL=texture(buf,uv-vec2(px.x,0)).r;
  float hR=texture(buf,uv+vec2(px.x,0)).r;
  float hD=texture(buf,uv-vec2(0,px.y)).r;
  float hU=texture(buf,uv+vec2(0,px.y)).r;
  vec3 nm=normalize(vec3(hR-hL,hU-hD,g*g*2.+.06));
  vec3 ld=normalize(vec3(.5,.8,1.6));
  float diff=dot(nm,ld)*.5+.5;
  float spec=pow(max(0.,dot(nm,ld)),lpow)*.7;
  vec3 rb=.5+.5*cos(vec3(1,2,3)+dot(nm,ld)*4.-uv.y*3.-3.);

  // Sur fond clair : diff reste élevé (pas d'assombrissement)
  // Sur fond sombre : diff normal
  float diffAdj=mix(diff, diff*.3+.7, bgLum);
  vec3 col=pc*smoothstep(.008,.08,g)*diffAdj;

  // Spéculaire : blanc sur fond sombre, couleur de fond sur fond clair
  vec3 specCol=mix(vec3(1.),bg+pc*.3,bgLum);
  col+=specCol*spec*.7;

  // Backlight : sombre sur fond noir, invisible sur fond clair
  col+=vec3(.12)*(1.-bgLum)*(1.-abs(dot(nm,vec3(0,0,1))));

  // Arc-en-ciel — atténué sur fond clair
  col+=rb*rainbow*smoothstep(.03,.0,g)*.8*(1.-bgLum*.6);
  col+=rb*rainbow*spec*.4;

  // Transition vers le fond — douce, sans halo noir
  float mask=smoothstep(.003,.05,g);
  col=mix(bg,clamp(col,0.,1.),mask);

  o=vec4(col,1);
}`;

function mkS(src,type){const s=gl.createShader(type);gl.shaderSource(s,src);gl.compileShader(s);if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)){console.error(gl.getShaderInfoLog(s));return null;}return s;}
function mkP(vs,fs){const p=gl.createProgram();gl.attachShader(p,mkS(vs,gl.VERTEX_SHADER));gl.attachShader(p,mkS(fs,gl.FRAGMENT_SHADER));gl.linkProgram(p);if(!gl.getProgramParameter(p,gl.LINK_STATUS)){console.error(gl.getProgramInfoLog(p));return null;}return p;}
const pSim=mkP(VS,FS_SIM),pOut=mkP(VS,FS_OUT);

const qb=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,qb);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
function bq(prog){const l=gl.getAttribLocation(prog,'p');gl.enableVertexAttribArray(l);gl.bindBuffer(gl.ARRAY_BUFFER,qb);gl.vertexAttribPointer(l,2,gl.FLOAT,false,0,0);}

function mkFB(){
  const t=gl.createTexture();gl.bindTexture(gl.TEXTURE_2D,t);
  gl.texImage2D(gl.TEXTURE_2D,0,FMT,SIM,SIM,0,gl.RGBA,TYPE,null);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
  const f=gl.createFramebuffer();gl.bindFramebuffer(gl.FRAMEBUFFER,f);
  gl.framebufferTexture2D(gl.FRAMEBUFFER,gl.COLOR_ATTACHMENT0,gl.TEXTURE_2D,t,0);
  gl.clearColor(0,0,0,0);gl.clear(gl.COLOR_BUFFER_BIT);
  gl.bindFramebuffer(gl.FRAMEBUFFER,null);return{tex:t,fb:f};
}
let fbA=mkFB(),fbB=mkFB();
const u1f=(p,n,v)=>gl.uniform1f(gl.getUniformLocation(p,n),v);
const u1i=(p,n,v)=>gl.uniform1i(gl.getUniformLocation(p,n),v);
const u3f=(p,n,a)=>gl.uniform3f(gl.getUniformLocation(p,n),a[0],a[1],a[2]);

let palIdx=0,bgRGB=[0.04,0.04,0.10],bgLum=0.0;
let spdMult=0.25,expan=0.022,turb=0.22,fade=0.15,brad=0.08,rainbow=0.55,lpow=18;
let pedalDown=false,firstNote=false,timeX=0;
let uiVisible=true;

/* ══ NOTES ACTIVES — position mobile ══════════════════ */
const activeNotes=new Map();

function velToMotion(vel,isEven){
  const VL=50,VH=110,VT=70,CO=35;
  let dx,dy;
  if(vel>=VH)      {dx=0;   dy=1;}
  else if(vel<=VL) {dx=0;   dy=-1;}
  else if(vel>=VT) {dx=isEven?.6:-.6; dy=.8;}
  else             {dx=isEven?.6:-.6; dy=-.8;}
  const len=Math.sqrt(dx*dx+dy*dy);
  dx/=len; dy/=len;
  const velN=(vel-1)/126;
  // Vitesse quadratique — forte vélocité = bouge vite
  const spd=0.0015+velN*velN*0.012;
  // Courbure
  let omega=0;
  if(vel>CO&&vel>VL&&vel<VH){
    const k=(vel-CO)/(127-CO);
    const od=1.2+(1.0-1.2)*Math.max(0,Math.min(1,k));
    omega=od*(vel>=VT?1:-1)*Math.PI/180;
  }
  return{dx,dy,spd,omega,velN};
}

function spawnNote(note,vel){
  const pal=PALETTES[palIdx];
  const name=NOTE_NAMES[note%12];
  const hsl=pal[name]||[0,80,60];
  const rgb=hsl2rgb(hsl[0],hsl[1],Math.min(93,hsl[2]+Math.floor(note/12)*3));
  const velN=(vel-1)/126;
  // Position de départ : Y=hauteur note, X=cyclique
  const y=0.12+((note-NOTE_MIN)/(NOTE_MAX-NOTE_MIN))*0.76;
  const x=0.5+Math.sin(timeX*0.08)*0.35;
  const{dx,dy,spd,omega}=velToMotion(vel,note%2===0);
  const r=brad*(0.4+velN*0.8);
  activeNotes.set(note,{
    x,y, dx,dy, spd, omega, theta:0,
    str:velN, col:rgb, rad:r, alive:true
  });
  timeX+=0.7+(vel/127)*1.3;
  if(!firstNote){firstNote=true;document.getElementById('hint').classList.add('gone');}
  logNote(note,vel,rgb);
}

function releaseNote(note){
  const nd=activeNotes.get(note);
  if(nd) nd.alive=false;
  setTimeout(()=>activeNotes.delete(note),800);
}

function onPedalChange(down){
  const was=pedalDown;pedalDown=down;
  document.getElementById('ped-ind').classList.toggle('on',down);
  if(!down&&was)[...activeNotes.keys()].forEach(n=>releaseNote(n));
}

function clearAll(){
  fbA=mkFB();fbB=mkFB();
  gl.bindFramebuffer(gl.FRAMEBUFFER,null);
  activeNotes.clear();
}

/* ══ BOUCLE ════════════════════════════════════════════ */
let lastT=0;
function loop(t){
  requestAnimationFrame(loop);
  const dt=Math.min(.05,(t-lastT)/1000);lastT=t;
  const time=t/1000;

  // Déplacer chaque note active
  for(const nd of activeNotes.values()){
    if(!nd.alive) continue;
    nd.theta+=nd.omega;
    const cosT=Math.cos(nd.theta),sinT=Math.sin(nd.theta);
    const nx=nd.dx*cosT-nd.dy*sinT;
    const ny=nd.dx*sinT+nd.dy*cosT;
    const sf=spdMult*dt*60;
    nd.x+=nx*nd.spd*sf;
    nd.y+=ny*nd.spd*sf;
    // Rebonds
    if(nd.x<0.02){nd.x=0.02;nd.dx=Math.abs(nd.dx);}
    if(nd.x>0.98){nd.x=0.98;nd.dx=-Math.abs(nd.dx);}
    if(nd.y<0.02){nd.y=0.02;nd.dy=Math.abs(nd.dy);}
    if(nd.y>0.98){nd.y=0.98;nd.dy=-Math.abs(nd.dy);}
  }

  const sl=[...activeNotes.values()];
  const N=Math.min(sl.length,16);
  const posA=new Float32Array(32);
  const strA=new Float32Array(16),radA=new Float32Array(16);
  const colA=new Float32Array(48);
  sl.forEach((s,i)=>{
    if(i>=16)return;
    posA[i*2]=s.x; posA[i*2+1]=s.y;
    strA[i]=s.alive?s.str:s.str*0.2;
    radA[i]=s.rad;
    colA[i*3]=s.col[0];colA[i*3+1]=s.col[1];colA[i*3+2]=s.col[2];
  });

  // Simulation
  gl.bindFramebuffer(gl.FRAMEBUFFER,fbB.fb);
  gl.viewport(0,0,SIM,SIM);
  gl.useProgram(pSim);bq(pSim);
  gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,fbA.tex);
  u1i(pSim,'prev',0);
  u1f(pSim,'time',time);u1f(pSim,'fade',fade);
  u1f(pSim,'turb',turb);u1f(pSim,'expan',expan);
  u1i(pSim,'n',N);
  if(N>0){
    gl.uniform2fv(gl.getUniformLocation(pSim,'pos'),posA);
    gl.uniform1fv(gl.getUniformLocation(pSim,'str'),strA);
    gl.uniform1fv(gl.getUniformLocation(pSim,'rad'),radA);
    gl.uniform3fv(gl.getUniformLocation(pSim,'col'),colA);
  }
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
  const tmp=fbA;fbA=fbB;fbB=tmp;

  // Rendu
  gl.bindFramebuffer(gl.FRAMEBUFFER,null);
  gl.viewport(0,0,canvas.width,canvas.height);
  gl.useProgram(pOut);bq(pOut);
  gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,fbA.tex);
  u1i(pOut,'buf',0);
  u1f(pOut,'rainbow',rainbow);u1f(pOut,'lpow',lpow);
  u1f(pOut,'bgLum',bgLum);
  u3f(pOut,'bg',bgRGB);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
}

/* ══ LOG ═══════════════════════════════════════════════ */
const logEl=document.getElementById('note-log');
function logNote(note,vel,rgb){
  const name=NOTE_NAMES[note%12],oct=Math.floor(note/12)-1;
  const d=document.createElement('div');d.className='nrow';
  d.innerHTML=`<div class="nbadge" style="background:rgb(${Math.round(rgb[0]*255)},${Math.round(rgb[1]*255)},${Math.round(rgb[2]*255)})"></div><span style="color:rgba(255,255,255,.72);min-width:26px">${name}${oct}</span><span style="color:rgba(255,255,255,.32)">vel ${vel}</span>`;
  logEl.prepend(d);if(logEl.children.length>6)logEl.removeChild(logEl.lastChild);
}

/* ══ MIDI ══════════════════════════════════════════════ */
const midiDot=document.getElementById('midi-dot');
const midiLbl=document.getElementById('midi-label');
function onMidi(e){
  const st=e.data[0]&0xF0,note=e.data[1],vel=e.data[2];
  if(st===0x90&&vel>0&&note>=NOTE_MIN&&note<=NOTE_MAX) spawnNote(note,vel);
  if((st===0x80||(st===0x90&&vel===0))&&note>=NOTE_MIN&&note<=NOTE_MAX) releaseNote(note);
  if(st===0xB0&&note===64) onPedalChange(vel>=64);
}
if(navigator.requestMIDIAccess){
  navigator.requestMIDIAccess({sysex:false}).then(midi=>{
    midiDot.classList.add('on');midiLbl.textContent='MIDI connecté';
    const conn=()=>{for(const i of midi.inputs.values())i.onmidimessage=onMidi;};
    conn();midi.onstatechange=conn;
  }).catch(()=>{midiDot.classList.add('err');midiLbl.textContent='Accès MIDI refusé';});
}else{midiDot.classList.add('err');midiLbl.textContent='WebMIDI non supporté';}

/* ══ CLAVIER ═══════════════════════════════════════════ */
const KEYMAP={a:60,w:61,s:62,e:63,d:64,f:65,t:66,g:67,y:68,h:69,u:70,j:71,k:72,l:73};
const held=new Set();
window.addEventListener('keydown',e=>{
  if(e.repeat)return;
  if(e.key===' '){e.preventDefault();onPedalChange(true);return;}
  if(e.key==='c'||e.key==='C'){clearAll();return;}
  if(e.key==='H'){  // H majuscule = cacher UI (minuscule = note)
    uiVisible=!uiVisible;
    document.getElementById('ui').classList.toggle('hidden',!uiVisible);
    document.getElementById('hide-hint').style.opacity=uiVisible?'0.2':'0';
    return;
  }
  const n=KEYMAP[e.key.toLowerCase()];
  if(n&&!held.has(e.key)){held.add(e.key);spawnNote(n,Math.floor(45+Math.random()*75));}
});
window.addEventListener('keyup',e=>{
  if(e.key===' '){onPedalChange(false);return;}
  const n=KEYMAP[e.key.toLowerCase()];
  if(n){held.delete(e.key);releaseNote(n);}
});

/* ══ CONTRÔLES ══════════════════════════════════════════ */
function bind(id,factor,setter,valId,fmt){
  document.getElementById(id).addEventListener('input',e=>{
    setter(+e.target.value/factor);
    document.getElementById(valId).textContent=fmt(+e.target.value/factor);
  });
}
bind('spd',100,v=>spdMult=v,'spd-v',v=>Math.round(v*100)+'%');
bind('expan',1000,v=>expan=v,'expan-v',v=>v.toFixed(3));
bind('turb',100,v=>turb=v,'turb-v',v=>v.toFixed(2));
bind('fade',1000,v=>fade=v,'fade-v',v=>v.toFixed(3));
bind('brad',1000,v=>brad=v,'brad-v',v=>v.toFixed(3));
bind('rainbow',100,v=>rainbow=v,'rainbow-v',v=>v.toFixed(2));
bind('lpow',1,v=>lpow=v,'lpow-v',v=>v.toFixed(0));

document.getElementById('pal-sel').addEventListener('change',e=>{palIdx=+e.target.value;});
document.getElementById('bg-sel').addEventListener('change',e=>{
  bgRGB=e.target.value.split(',').map(Number);
  // Luminosité perçue du fond (0=sombre, 1=clair)
  bgLum=bgRGB[0]*0.299+bgRGB[1]*0.587+bgRGB[2]*0.114;
  clearAll();
});

window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});
requestAnimationFrame(loop);
</script>
