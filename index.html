<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Test traînée</title>
<style>*{margin:0}body{background:#000;overflow:hidden}</style>
</head><body>
<div style="position:fixed;top:10px;left:10px;color:white;font:12px monospace;z-index:10">
  A = monte (rouge) &nbsp; S = horizontal (vert) &nbsp; D = descend (bleu) &nbsp; C = effacer<br>
  La traînée = série de sphères qui rétrécissent et s'effacent
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0.04, 0.04, 0.10);

const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 100);
camera.position.set(0, 0, 10);

scene.add(new THREE.AmbientLight(0xffffff, 0.4));
const dL = new THREE.DirectionalLight(0xffffff, 1);
dL.position.set(5, 8, 10);
scene.add(dL);

// Pool de géométries réutilisables pour les gouttes
const dropGeo = new THREE.SphereGeometry(1, 8, 6); // rayon 1, on scale

const blobs = [];
const drops = []; // toutes les gouttes dans la scène

function spawnBlob(color, vy) {
  const mat = new THREE.MeshPhongMaterial({color, shininess:80});
  const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.3, 16, 12), mat);
  mesh.position.set(-4, 0, 0);
  scene.add(mesh);
  blobs.push({mesh, color, vy, alive:true, dropTimer:0});
}

function spawnDrop(color, x, y, z, size) {
  const mat = new THREE.MeshPhongMaterial({
    color, transparent:true, opacity:0.85
  });
  const mesh = new THREE.Mesh(dropGeo, mat);
  mesh.position.set(x, y, z);
  mesh.scale.setScalar(size);
  scene.add(mesh);
  drops.push({mesh, mat, age:0, maxAge:4.0, initSize:size});
}

window.addEventListener('keydown', e => {
  if(e.key==='a') spawnBlob(0xff3333,  0.07);
  if(e.key==='s') spawnBlob(0x33ff66,  0);
  if(e.key==='d') spawnBlob(0x3366ff, -0.07);
  if(e.key==='c') {
    blobs.forEach(b => scene.remove(b.mesh));
    drops.forEach(d => { scene.remove(d.mesh); d.mat.dispose(); });
    blobs.length = 0; drops.length = 0;
  }
});

const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(0.05, clock.getDelta());

  // Update blobs
  for(let i=blobs.length-1; i>=0; i--) {
    const b = blobs[i];
    b.mesh.position.x += 0.05;
    b.mesh.position.y += b.vy;

    // Déposer une goutte toutes les ~40ms
    b.dropTimer += dt;
    if(b.dropTimer > 0.04) {
      b.dropTimer = 0;
      spawnDrop(b.color,
        b.mesh.position.x, b.mesh.position.y, b.mesh.position.z,
        0.28); // légèrement plus petite que le blob (r=0.3)
    }

    if(b.mesh.position.x > 6) {
      scene.remove(b.mesh);
      blobs.splice(i, 1);
    }
  }

  // Update gouttes : rétrécissement + fade
  for(let i=drops.length-1; i>=0; i--) {
    const d = drops[i];
    d.age += dt;
    const life = 1 - d.age / d.maxAge;
    if(life <= 0) {
      scene.remove(d.mesh); d.mat.dispose();
      drops.splice(i, 1);
      continue;
    }
    // Rétrécit progressivement
    d.mesh.scale.setScalar(d.initSize * life * 0.9);
    // S'efface
    d.mat.opacity = life * 0.8;
  }

  renderer.render(scene, camera);
}
animate();
</script>
</body></html>
