<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Test blob step 1</title>
<style>*{margin:0}body{background:#111;overflow:hidden}</style>
</head><body>
<div style="position:fixed;top:10px;left:10px;color:white;font:13px monospace;z-index:10;background:rgba(0,0,0,0.5);padding:8px;border-radius:6px">
  Maintiens <b>A</b> (rouge/monte) &nbsp; <b>S</b> (vert/fixe) &nbsp; <b>D</b> (bleu/descend)<br>
  Relâche → traînée reste &nbsp;&nbsp; <b>C</b> = effacer<br>
  <span id="status" style="color:#4dff91">Chargement...</span>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const status = document.getElementById('status');

// Setup
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);
const scene = new THREE.Scene();
scene.background = new THREE.Color(0.06, 0.06, 0.14);
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 100);
camera.position.set(0, 0, 10);
scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const dL = new THREE.DirectionalLight(0xffffff, 1.0);
dL.position.set(5, 8, 10); scene.add(dL);

// Géométrie partagée
const geo = new THREE.SphereGeometry(1, 16, 12);

// ÉTAPE 1 : vertex shader avec déformation FBM uniquement
// Fragment shader = Phong standard (pas de shader custom)
const VERT = `
uniform float u_time;
uniform float u_seed;
uniform float u_rough;
varying vec3 vNormal;
varying vec3 vWorldPos;

float hash(vec3 p) {
  return fract(sin(dot(p, vec3(127.1, 311.7, 74.7))) * 43758.5453);
}
float noise(vec3 p) {
  vec3 i = floor(p);
  vec3 f = fract(p);
  vec3 u = f * f * (3.0 - 2.0 * f);
  return mix(
    mix(mix(hash(i), hash(i+vec3(1,0,0)), u.x),
        mix(hash(i+vec3(0,1,0)), hash(i+vec3(1,1,0)), u.x), u.y),
    mix(mix(hash(i+vec3(0,0,1)), hash(i+vec3(1,0,1)), u.x),
        mix(hash(i+vec3(0,1,1)), hash(i+vec3(1,1,1)), u.x), u.y), u.z);
}
float fbm(vec3 p) {
  float v = 0.0, a = 0.5;
  for(int i = 0; i < 3; i++) {
    v += a * noise(p);
    p = p * 2.0 + vec3(1.7, 9.2, 3.5);
    a *= 0.5;
  }
  return v;
}

void main() {
  // Déformer la sphère selon le bruit
  float disp = fbm(normal * 3.0 + u_seed) * u_rough * 0.4;
  vec3 newPos = position + normal * disp;
  vNormal = normalize(normalMatrix * normal);
  vWorldPos = (modelMatrix * vec4(newPos, 1.0)).xyz;
  gl_Position = projectionMatrix * modelViewMatrix * vec4(newPos, 1.0);
}`;

// Fragment shader standard Three.js (pas custom)
// On utilise MeshPhongMaterial mais avec notre vertex shader
// → on utilise ShaderMaterial avec un frag simple
const FRAG = `
uniform vec3 u_color;
uniform float u_opacity;
varying vec3 vNormal;
varying vec3 vWorldPos;

void main() {
  vec3 n = normalize(vNormal);
  vec3 ld = normalize(vec3(0.6, 0.8, 1.0));
  float diff = max(0.0, dot(n, ld)) * 0.7 + 0.3;
  vec3 vd = normalize(cameraPosition - vWorldPos);
  vec3 hv = normalize(ld + vd);
  float spec = pow(max(0.0, dot(n, hv)), 32.0) * 0.5;
  vec3 col = u_color * diff + vec3(spec);
  gl_FragColor = vec4(col, u_opacity);
}`;

function makeMat(r, g, b, opacity, seed) {
  return new THREE.ShaderMaterial({
    vertexShader: VERT,
    fragmentShader: FRAG,
    uniforms: {
      u_time:    {value: 0.0},
      u_seed:    {value: seed},
      u_rough:   {value: 0.5},
      u_color:   {value: new THREE.Color(r, g, b)},
      u_opacity: {value: opacity}
    },
    transparent: opacity < 1.0,
    depthWrite: opacity >= 1.0
  });
}

// Test : créer une sphère statique pour vérifier que le shader compile
try {
  const testMat = makeMat(1, 0.3, 0.3, 1.0, 42.0);
  const testMesh = new THREE.Mesh(geo, testMat);
  testMesh.scale.setScalar(0.3);
  testMesh.position.set(0, 0, 0);
  scene.add(testMesh);
  status.textContent = 'Shader OK — appuie sur A, S, D';
  status.style.color = '#4dff91';
} catch(e) {
  status.textContent = 'Erreur shader: ' + e.message;
  status.style.color = '#ff5555';
}

const activeBlobs = new Map();
const drops = [];
const DROP_INTERVAL = 0.02;
const DROP_LIFE = 7.0;

function spawnBlob(key, r, g, b, vy) {
  if (activeBlobs.has(key)) releaseBlob(key);
  const seed = Math.random() * 100;
  const mat = makeMat(r, g, b, 1.0, seed);
  const mesh = new THREE.Mesh(geo, mat);
  mesh.scale.setScalar(0.30);
  mesh.position.set(-4, 0, 0);
  scene.add(mesh);
  activeBlobs.set(key, {mesh, mat, r, g, b, vy, seed, timer: 0});
}

function releaseBlob(key) {
  const b = activeBlobs.get(key);
  if (!b) return;
  scene.remove(b.mesh);
  b.mat.dispose();
  activeBlobs.delete(key);
}

function depositDrop(b) {
  const seed = b.seed + Math.random() * 3;
  const mat = makeMat(b.r, b.g, b.b, 0.78, seed);
  const mesh = new THREE.Mesh(geo, mat);
  mesh.scale.setScalar(0.25);
  mesh.position.copy(b.mesh.position);
  mesh.position.x += (Math.random() - 0.5) * 0.03;
  mesh.position.y += (Math.random() - 0.5) * 0.03;
  scene.add(mesh);
  drops.push({mesh, mat, age: 0, maxAge: DROP_LIFE});
}

function clearAll() {
  for (const k of activeBlobs.keys()) releaseBlob(k);
  drops.forEach(d => { scene.remove(d.mesh); d.mat.dispose(); });
  drops.length = 0;
}

window.addEventListener('keydown', e => {
  if (e.repeat) return;
  if (e.key==='a'||e.key==='A') spawnBlob('a', 1.0, 0.2, 0.2,  0.07);
  if (e.key==='s'||e.key==='S') spawnBlob('s', 0.2, 1.0, 0.4,  0.00);
  if (e.key==='d'||e.key==='D') spawnBlob('d', 0.3, 0.5, 1.0, -0.07);
  if (e.key==='c'||e.key==='C') clearAll();
});
window.addEventListener('keyup', e => {
  if (e.key==='a'||e.key==='A') releaseBlob('a');
  if (e.key==='s'||e.key==='S') releaseBlob('s');
  if (e.key==='d'||e.key==='D') releaseBlob('d');
});

const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(0.05, clock.getDelta());
  const t = clock.getElapsedTime();

  for (const [k, b] of activeBlobs) {
    b.mesh.position.x += 0.04;
    b.mesh.position.y += b.vy;
    b.mat.uniforms.u_time.value = t;
    b.timer += dt;
    if (b.timer >= DROP_INTERVAL) {
      b.timer = 0;
      depositDrop(b);
    }
    if (b.mesh.position.x > 6) releaseBlob(k);
  }

  for (let i = drops.length - 1; i >= 0; i--) {
    const d = drops[i];
    d.age += dt;
    d.mat.uniforms.u_time.value = t;
    const life = Math.max(0, 1 - d.age / d.maxAge);
    d.mesh.scale.setScalar(0.25 * (0.35 + life * 0.65));
    d.mat.uniforms.u_opacity.value = life * 0.75;
    if (life <= 0) {
      scene.remove(d.mesh); d.mat.dispose();
      drops.splice(i, 1);
    }
  }

  renderer.render(scene, camera);
}
animate();
</script>
</body></html>
