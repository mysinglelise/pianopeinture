<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Test traînée shader</title>
<style>*{margin:0}body{background:#000;overflow:hidden}</style>
</head><body>
<div style="position:fixed;top:10px;left:10px;color:white;font:11px monospace;z-index:10">
  Maintiens A (rouge/monte) S (vert/horizontal) D (bleu/descend)<br>
  Relâche → traînée reste 8s &nbsp; C = effacer
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);
const scene = new THREE.Scene();
scene.background = new THREE.Color(0.04,0.04,0.10);
const camera = new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,100);
camera.position.set(0,0,10);
scene.add(new THREE.AmbientLight(0xffffff,0.35));
const dL=new THREE.DirectionalLight(0xffffff,0.9);
dL.position.set(5,8,10);scene.add(dL);
scene.add(Object.assign(new THREE.DirectionalLight(0x6688ff,0.3),{position:new THREE.Vector3(-5,-4,-8)}));

/* ── Shader blob ────────────────────────────────────── */
const VERT=`
uniform float u_time;
uniform float u_rough;
uniform float u_seed;
varying vec3 vN;varying vec3 vWP;
float hash(vec3 p){return fract(sin(dot(p,vec3(127.1,311.7,74.7)))*43758.5453);}
float noise(vec3 p){
  vec3 i=floor(p),f=fract(p),u=f*f*(3.-2.*f);
  return mix(mix(mix(hash(i),hash(i+vec3(1,0,0)),u.x),mix(hash(i+vec3(0,1,0)),hash(i+vec3(1,1,0)),u.x),u.y),
             mix(mix(hash(i+vec3(0,0,1)),hash(i+vec3(1,0,1)),u.x),mix(hash(i+vec3(0,1,1)),hash(i+vec3(1,1,1)),u.x),u.y),u.z);
}
float fbm(vec3 p){float v=0.,a=.5;for(int i=0;i<3;i++){v+=a*noise(p);p=p*2.+vec3(1.7,9.2,3.5);a*=.5;}return v;}
void main(){
  vec3 p=position+normal*fbm(normal*3.+u_seed+u_time*.2)*u_rough*.4;
  vN=normalize(normalMatrix*normal);
  vWP=(modelMatrix*vec4(p,1.)).xyz;
  gl_Position=projectionMatrix*modelViewMatrix*vec4(p,1.);
}`;

const FRAG=`
uniform vec3 u_color;uniform float u_irid;uniform float u_time;uniform float u_alpha;
varying vec3 vN;varying vec3 vWP;
void main(){
  vec3 n=normalize(vN),ld=normalize(vec3(.6,.8,1.));
  vec3 vd=normalize(cameraPosition-vWP),hv=normalize(ld+vd);
  float diff=max(0.,dot(n,ld))*.65+.35;
  float spec=pow(max(0.,dot(n,hv)),28.)*.6;
  float fr=pow(1.-max(0.,dot(n,vd)),2.2);
  vec3 ird=.5+.5*cos(vec3(0,2.094,4.188)+dot(n,ld)*5.-u_time*.4);
  vec3 col=u_color*diff+vec3(spec)+ird*u_irid*fr*1.5+u_color*fr*.3;
  gl_FragColor=vec4(clamp(col,0.,1.),u_alpha);
}`;

function makeBlobMat(color, alpha, seed){
  return new THREE.ShaderMaterial({
    vertexShader:VERT, fragmentShader:FRAG,
    uniforms:{
      u_time:{value:0},
      u_color:{value:new THREE.Color(color[0],color[1],color[2])},
      u_rough:{value:0.5},
      u_irid:{value:0.6},
      u_seed:{value:seed},
      u_alpha:{value:alpha}
    },
    transparent:true
  });
}

/* ── Géométrie partagée (sphère simple, shader déforme) */
const sharedGeo = new THREE.SphereGeometry(1, 16, 12); // rayon 1, on scale

/* ── Blobs actifs ───────────────────────────────────── */
const activeBlobs = new Map();
/* ── Gouttes de traînée (toutes, actives et figées) ── */
const drops = [];

const DROP_INTERVAL = 0.025; // déposer une goutte toutes les 25ms
const DROP_LIFE     = 8.0;   // durée de vie en secondes
const BLOB_RADIUS   = 0.30;  // rayon du blob principal
const DROP_RADIUS   = 0.26;  // rayon des gouttes (légèrement plus petit)

function spawnBlob(key, color, vy){
  if(activeBlobs.has(key)) releaseBlob(key);
  const seed = Math.random()*100;
  const mat  = makeBlobMat(color, 1.0, seed);
  const mesh = new THREE.Mesh(sharedGeo, mat);
  mesh.scale.setScalar(BLOB_RADIUS);
  mesh.position.set(-4, 0, 0);
  scene.add(mesh);
  activeBlobs.set(key,{mesh,mat,color,vy,seed,timer:0,alive:true});
}

function releaseBlob(key){
  const b = activeBlobs.get(key);
  if(!b) return;
  scene.remove(b.mesh);
  activeBlobs.delete(key);
}

function depositDrop(b){
  const seed = b.seed + Math.random()*0.5; // légère variation
  const mat  = makeBlobMat(b.color, 0.75, seed);
  const mesh = new THREE.Mesh(sharedGeo, mat);
  mesh.scale.setScalar(DROP_RADIUS);
  mesh.position.copy(b.mesh.position);
  // Légère variation de position (irrégularité)
  mesh.position.x += (Math.random()-.5)*0.04;
  mesh.position.y += (Math.random()-.5)*0.04;
  scene.add(mesh);
  drops.push({mesh, mat, age:0, maxAge:DROP_LIFE, initR:DROP_RADIUS});
}

function clearAll(){
  for(const k of activeBlobs.keys()) releaseBlob(k);
  drops.forEach(d=>{scene.remove(d.mesh);d.mat.dispose();});
  drops.length=0;
}

/* ── Clavier ─────────────────────────────────────────── */
window.addEventListener('keydown', e=>{
  if(e.repeat) return;
  if(e.key==='a') spawnBlob('a',[1.0,0.2,0.2],  0.07);
  if(e.key==='s') spawnBlob('s',[0.2,1.0,0.5],  0);
  if(e.key==='d') spawnBlob('d',[0.3,0.5,1.0], -0.07);
  if(e.key==='c') clearAll();
});
window.addEventListener('keyup', e=>{
  if('asd'.includes(e.key)) releaseBlob(e.key);
});

/* ── Boucle ─────────────────────────────────────────── */
const clock = new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const dt  = Math.min(0.05, clock.getDelta());
  const t   = clock.getElapsedTime();

  // Update blobs actifs
  for(const [k,b] of activeBlobs){
    b.mesh.position.x += 0.045;
    b.mesh.position.y += b.vy;
    b.mat.uniforms.u_time.value = t;

    b.timer += dt;
    if(b.timer >= DROP_INTERVAL){
      b.timer = 0;
      depositDrop(b);
    }
    if(b.mesh.position.x > 6) releaseBlob(k);
  }

  // Update gouttes : fade + légère réduction
  for(let i=drops.length-1; i>=0; i--){
    const d = drops[i];
    d.age += dt;
    d.mat.uniforms.u_time.value = t;
    const life = Math.max(0, 1 - d.age/d.maxAge);
    // Rétrécit doucement
    const r = d.initR * (0.5 + life*0.5);
    d.mesh.scale.setScalar(r);
    d.mat.uniforms.u_alpha.value = life * 0.72;
    if(life <= 0){
      scene.remove(d.mesh); d.mat.dispose();
      drops.splice(i,1);
    }
  }

  renderer.render(scene,camera);
}
animate();
</script>
</body></html>
